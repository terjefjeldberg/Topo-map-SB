<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Topo map</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #040d14; }
  #cesiumViewport { position: absolute; inset: 0; z-index: 0; }

  /* ── top bar ── */
  #topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px;
    background: rgba(4,13,20,0.82);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0,212,255,0.12);
    font-family: 'DM Mono', monospace;
  }
  #topbar-title {
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 13px; letter-spacing: 0.08em; color: #eaf4ff;
    flex: 1;
  }
  #conn-status { font-size: 11px; color: #3a5a7a; white-space: nowrap; }
  #conn-status.connected { color: #00d4ff; }

  .crs-label { font-size: 11px; color: #4a7a9b; }
  #crs-input {
    width: 58px; padding: 4px 6px;
    background: rgba(0,212,255,0.06);
    border: 1px solid rgba(0,212,255,0.2);
    color: #00d4ff; font-family: 'DM Mono', monospace; font-size: 11px;
    outline: none; border-radius: 2px;
  }
  #crs-input:focus { border-color: rgba(0,212,255,0.5); background: rgba(0,212,255,0.1); }
  #crs-select {
    padding: 4px 6px;
    background: rgba(0,212,255,0.06);
    border: 1px solid rgba(0,212,255,0.2);
    color: #7ab8d4; font-family: 'DM Mono', monospace; font-size: 11px;
    outline: none; border-radius: 2px; cursor: pointer;
  }
  #crs-apply {
    padding: 4px 10px;
    background: rgba(0,212,255,0.15);
    border: 1px solid rgba(0,212,255,0.35);
    color: #00d4ff; font-family: 'DM Mono', monospace; font-size: 11px;
    cursor: pointer; border-radius: 2px; letter-spacing: 0.05em;
    transition: background 0.15s;
  }
  #crs-apply:hover { background: rgba(0,212,255,0.28); }

  /* ── coords overlay ── */
  /* Compass */
  #compass {
    position: fixed;
    bottom: 90px;
    left: 12px;
    width: 60px;
    text-align: center;
    z-index: 20;
    user-select: none;
  }
  #compass-svg { width: 60px; height: 60px; display: block; }
  #compass-hdg {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #00d4ff;
    text-align: center;
    margin-top: 2px;
    letter-spacing: 1px;
  }

  /* Measure */
  #measure-panel {
    position: fixed;
    bottom: 160px;
    left: 12px;
    z-index: 20;
  }
  #measure-btn {
    background: rgba(0,0,0,0.7);
    border: 1px solid #333;
    color: #ccc;
    width: 36px; height: 36px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px;
    transition: border-color 0.2s;
  }
  #measure-btn.active { border-color: #00d4ff; color: #00d4ff; }
  #measure-result {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #00d4ff;
    margin-top: 6px;
    white-space: nowrap;
    text-shadow: 0 0 8px #00d4ff44;
  }

  /* Sight btn */
  #sight-btn {
    position: fixed;
    bottom: 210px;
    left: 12px;
    background: rgba(0,0,0,0.7);
    border: 1px solid #333;
    color: #ccc;
    width: 36px; height: 36px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px;
    z-index: 20;
    transition: border-color 0.2s;
  }
  #sight-btn.active { border-color: #00d4ff; color: #00d4ff; }

  /* Profile */
  #profile-panel {
    position: fixed;
    bottom: 20px;
    left: 80px;
    background: rgba(0,0,0,0.85);
    border: 1px solid #00d4ff44;
    padding: 10px;
    z-index: 20;
    border-radius: 4px;
  }
  #profile-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #00d4ff;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  #profile-canvas { display: block; background: rgba(0,20,30,0.8); }

  #coords {
    position: absolute; bottom: 28px; left: 12px; z-index: 10;
    display: none;
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: #00d4ff; line-height: 1.8;
    background: rgba(4,13,20,0.7);
    padding: 6px 10px; border-radius: 2px;
    border-left: 2px solid rgba(0,212,255,0.4);
  }

  /* ── setup overlay ── */
  #setup-overlay {
    position: absolute; inset: 0; z-index: 20;
    display: flex; align-items: center; justify-content: center;
    background: rgba(4,13,20,0.92);
    backdrop-filter: blur(16px);
  }
  .setup-card {
    width: 320px;
    border: 1px solid rgba(0,212,255,0.2);
    background: rgba(8,20,32,0.95);
    padding: 28px;
  }
  .setup-card h2 {
    font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
    color: #eaf4ff; letter-spacing: 0.06em; margin-bottom: 6px;
  }
  .setup-card p {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: #4a7a9b; line-height: 1.7; margin-bottom: 18px;
  }
  .epsg-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
  }
  .epsg-row span {
    font-family: 'DM Mono', monospace; font-size: 12px; color: #4a7a9b;
  }
  #epsg-input {
    flex: 1; padding: 7px 10px;
    background: rgba(0,212,255,0.06);
    border: 1px solid rgba(0,212,255,0.2);
    color: #00d4ff; font-family: 'DM Mono', monospace; font-size: 12px;
    outline: none; border-radius: 2px;
  }
  #epsg-input:focus { border-color: rgba(0,212,255,0.5); }
  .presets {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px;
  }
  .p-btn {
    padding: 4px 10px;
    border: 1px solid rgba(0,212,255,0.2);
    background: rgba(0,212,255,0.04);
    color: #4a9ab4; font-family: 'DM Mono', monospace; font-size: 10px;
    cursor: pointer; border-radius: 2px; transition: all 0.15s;
  }
  .p-btn:hover { background: rgba(0,212,255,0.14); color: #00d4ff; border-color: rgba(0,212,255,0.4); }
  .go-btn {
    width: 100%; padding: 10px;
    background: rgba(0,212,255,0.15);
    border: 1px solid rgba(0,212,255,0.4);
    color: #00d4ff; font-family: 'DM Mono', monospace;
    font-size: 12px; letter-spacing: 0.12em;
    cursor: pointer; border-radius: 2px;
    transition: background 0.15s;
  }
  .go-btn:hover { background: rgba(0,212,255,0.28); }

  /* ── loading screen ── */
  #loading-screen {
    position: absolute; inset: 0; z-index: 15;
    display: none; align-items: center; justify-content: center;
    background: rgba(4,13,20,0.92); backdrop-filter: blur(16px);
    font-family: 'DM Mono', monospace;
  }
  .loading-inner { text-align: center; }
  .loading-inner .dot-anim {
    display: inline-block; width: 6px; height: 6px;
    background: #00d4ff; border-radius: 50%;
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.2} 50%{opacity:1} }
  #log-list {
    margin-top: 14px; font-size: 10px; color: #3a6a8a;
    max-height: 120px; overflow-y: auto; text-align: left; width: 260px;
  }
  #log-list div { padding: 2px 0; }
  #log-list .ok { color: #00d4ff; }
  #log-list .warn { color: #f0a030; }
  #log-list .err { color: #f04040; }
</style>
</head>
<body>

<!-- StreamBIM API — must be first, before anything else -->
<script src="./streambim-widget-api.min.js"></script>
<script>
// ── Global state ──
window._sbState = {
  epsg: 'EPSG:5946',
  pending: [], ready: false,
  viewer: null, marker: null, lastPos: null
};
var S = window._sbState;

// ── TM parameters for Norwegian NTM and UTM zones ──
var _tmParams = {
  'EPSG:5941': { lon0: 6.5,  lat0: 58, x0: 100000, y0: 1000000 },
  'EPSG:5942': { lon0: 7.5,  lat0: 58, x0: 100000, y0: 1000000 },
  'EPSG:5943': { lon0: 8.5,  lat0: 58, x0: 100000, y0: 1000000 },
  'EPSG:5944': { lon0: 9.5,  lat0: 58, x0: 100000, y0: 1000000 },
  'EPSG:5945': { lon0: 10.5, lat0: 58, x0: 100000, y0: 1000000 },
  'EPSG:5946': { lon0: 6.5,  lat0: 58, x0: 100000, y0: 1000000 },
  'EPSG:5947': { lon0: 7.5,  lat0: 58, x0: 100000, y0: 1000000 },
  'EPSG:5948': { lon0: 8.5,  lat0: 58, x0: 100000, y0: 1000000 },
  'EPSG:5949': { lon0: 9.5,  lat0: 58, x0: 100000, y0: 1000000 },
  'EPSG:5950': { lon0: 10.5, lat0: 58, x0: 100000, y0: 1000000 },
  'EPSG:5545': { lon0: 18.0, lat0: 0,  x0: 500000, y0: 0 },
  'EPSG:25832': { lon0: 9.0,  lat0: 0,  x0: 500000, y0: 0 },
  'EPSG:25833': { lon0: 15.0, lat0: 0,  x0: 500000, y0: 0 },
  'EPSG:32632': { lon0: 9.0,  lat0: 0,  x0: 500000, y0: 0 },
  'EPSG:32633': { lon0: 15.0, lat0: 0,  x0: 500000, y0: 0 }
};

function toWgs84(easting, northing) {
  var epsgKey = S.epsg ? S.epsg.toString().trim().toUpperCase() : '';
  if (epsgKey.indexOf('EPSG:') === -1) epsgKey = 'EPSG:' + epsgKey.replace('EPSG','').trim();
  var p = _tmParams[epsgKey] || _tmParams['EPSG:5946'];
  var a=6378137.0, f=1/298.257222101;
  var b=a*(1-f), e2=1-(b/a)*(b/a), k0=1.0;
  var lon0=p.lon0*Math.PI/180, lat0=p.lat0*Math.PI/180;
  var x=easting-p.x0, y=northing-p.y0;
  var A0=1-e2/4-3*e2*e2/64-5*e2*e2*e2/256;
  var A2=3/8*(e2+e2*e2/4+15*e2*e2*e2/128);
  var A4=15/256*(e2*e2+3*e2*e2*e2/4);
  var A6=35*e2*e2*e2/3072;
  var M0=a*(A0*lat0-A2*Math.sin(2*lat0)+A4*Math.sin(4*lat0)-A6*Math.sin(6*lat0));
  var M=M0+y/k0, mu=M/(a*A0);
  var e1=(1-Math.sqrt(1-e2))/(1+Math.sqrt(1-e2));
  var lat_fp=mu+(3*e1/2-27*e1*e1*e1/32)*Math.sin(2*mu)
    +(21*e1*e1/16-55*e1*e1*e1*e1/32)*Math.sin(4*mu)
    +(151*e1*e1*e1/96)*Math.sin(6*mu)
    +(1097*e1*e1*e1*e1/512)*Math.sin(8*mu);
  var sinFP=Math.sin(lat_fp), cosFP=Math.cos(lat_fp), tanFP=Math.tan(lat_fp);
  var N1=a/Math.sqrt(1-e2*sinFP*sinFP);
  var T1=tanFP*tanFP, C1=e2/(1-e2)*cosFP*cosFP;
  var R1=a*(1-e2)/Math.pow(1-e2*sinFP*sinFP,1.5);
  var D=x/(N1*k0);
  var lat=lat_fp-(N1*tanFP/R1)*(D*D/2-(5+3*T1+10*C1-4*C1*C1-9*e2/(1-e2))*D*D*D*D/24);
  var lon=lon0+(D-(1+2*T1+C1)*D*D*D/6)/cosFP;
  return { lat: lat*180/Math.PI, lon: lon*180/Math.PI };
}

// Polling must be defined before StreamBIM.connect fires
window._startPolling = function() {
  if (window._pollInterval) return;
  window._pollInterval = setInterval(function() {
    if (!S || !S.api) return;
    S.api.getCameraState().then(function(cam) {
      if (!cam) return;
      if (!window._pollLogged) {
        window._pollLogged = true;
        console.log('POLL CAM:', JSON.stringify(cam));
      }
      if (Array.isArray(cam.position)) {
        cam.position = { easting: cam.position[0], alt: cam.position[1], northing: cam.position[2] };
      }
      if (cam.quaternion && Array.isArray(cam.quaternion)) {
        cam.orientation = { x: cam.quaternion[0], y: cam.quaternion[1], z: cam.quaternion[2], w: cam.quaternion[3] };
      }
      window._onCamera(cam);
    }).catch(function(){});
  }, 100);
};

// ── StreamBIM connect — must happen synchronously on page load ──
window.StreamBIM.connect({
  cameraChanged: function(cam) {
    var el = document.getElementById('conn-status');
    if (el) { el.textContent = '● Connected'; el.className = 'connected'; }
    window._startPolling();
    if (!cam) return;
    var pos = Array.isArray(cam.position)
      ? cam.position
      : [cam.position.x, cam.position.y, cam.position.z];
    cam.position = { easting: pos[0], alt: pos[1], northing: pos[2] };
    var quat = cam.quaternion || cam.orientation;
    if (quat && Array.isArray(quat))
      cam.orientation = { x: quat[0], y: quat[1], z: quat[2], w: quat[3] };

    // Update coords display
    var coords = document.getElementById('coords');
    if (coords) coords.style.display = 'block';
    var vl = document.getElementById('v-lat');
    var vn = document.getElementById('v-lon');
    var va = document.getElementById('v-alt');
    if (vl) vl.textContent = 'E  ' + cam.position.easting.toFixed(1);
    if (vn) vn.textContent = 'N  ' + cam.position.northing.toFixed(1);
    if (va) va.textContent = 'H  ' + cam.position.alt.toFixed(1) + ' m';

    if (!S.ready) { S.pending.push({ type: 'cam', d: cam }); return; }
    window._onCamera(cam);
  },
  pickedObject: function(res) {
    if (!res || !res.point) return;
    if (!S.ready) { S.pending.push({ type: 'pick', d: res }); return; }
    window._onPick(res);
  }
}).then(function() {
  S.connected = true;
}).catch(function(e) {
  var el = document.getElementById('conn-status');
  if (el) { el.textContent = '● Disconnected'; el.style.color = '#f04040'; }
});
</script>

<!-- Cesium CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cesium@1.136.0/Build/Cesium/Widgets/widgets.css"/>

<!-- Fullscreen Cesium viewport -->
<div id="cesiumViewport"></div>

<!-- Top bar -->
<div id="topbar">
  <span id="topbar-title">TOPO MAP</span>
  <span id="conn-status">● Connecting…</span>
  <span class="crs-label">EPSG:</span>
  <input id="crs-input" type="number" placeholder="5946" value="5946"/>
  <select id="crs-select" onchange="if(this.value){document.getElementById('crs-input').value=this.value;this.value=''}">
    <option value="">presets…</option>
    <option value="5946">5946 – NTM 6</option>
    <option value="5945">5945 – NTM 5</option>
    <option value="5947">5947 – NTM 7</option>
    <option value="5545">5545</option>
    <option value="25832">25832 – UTM 32N</option>
    <option value="25833">25833 – UTM 33N</option>
  </select>
  <button id="crs-apply" onclick="changeCRS()">Apply</button>
</div>

<!-- Coords overlay -->
<div id="coords">
  <span id="v-lat">—</span><br>
  <span id="v-lon">—</span><br>
  <span id="v-alt">—</span>
</div>

<!-- Compass -->
<div id="compass">
  <svg id="compass-svg" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
    <circle cx="30" cy="30" r="28" fill="rgba(0,0,0,0.55)" stroke="#00d4ff" stroke-width="1.2"/>
    <text x="30" y="10" text-anchor="middle" fill="#00d4ff" font-size="9" font-family="DM Mono,monospace" font-weight="bold">N</text>
    <text x="50" y="33" text-anchor="middle" fill="#888" font-size="8" font-family="DM Mono,monospace">E</text>
    <text x="30" y="54" text-anchor="middle" fill="#888" font-size="8" font-family="DM Mono,monospace">S</text>
    <text x="10" y="33" text-anchor="middle" fill="#888" font-size="8" font-family="DM Mono,monospace">W</text>
    <g id="compass-needle">
      <polygon points="30,8 27,30 30,26 33,30" fill="#00d4ff"/>
      <polygon points="30,52 27,30 30,34 33,30" fill="#c00"/>
    </g>
    <circle cx="30" cy="30" r="3" fill="#fff" opacity="0.8"/>
  </svg>
  <div id="compass-hdg">000°</div>
</div>

<!-- Measure tool -->
<div id="measure-panel">
  <button id="measure-btn" onclick="toggleMeasure()" title="Avstandsmåling">📏</button>
  <div id="measure-result"></div>
</div>

<!-- Sight line toggle -->
<button id="sight-btn" onclick="toggleSightLine()" title="Siktlinje">👁</button>

<!-- Profile panel -->
<div id="profile-panel" style="display:none">
  <div id="profile-title">HØYDEPROFIL</div>
  <canvas id="profile-canvas" width="320" height="120"></canvas>
  <button onclick="document.getElementById('profile-panel').style.display='none'" style="background:none;border:none;color:#888;cursor:pointer;font-size:11px;margin-top:4px;">✕ lukk</button>
</div>

<!-- Setup overlay -->
<div id="setup-overlay">
  <div class="setup-card">
    <h2>TOPO MAP</h2>
    <p>Select your project CRS from the presets or enter the EPSG code manually.</p>
    <div class="epsg-row">
      <span>EPSG:</span>
      <input id="epsg-input" type="number" value="5946" placeholder="5946"/>
    </div>
    <div class="presets">
      <div class="p-btn" onclick="sp('5946')">NTM 6 — 5946</div>
      <div class="p-btn" onclick="sp('5945')">NTM 5 — 5945</div>
      <div class="p-btn" onclick="sp('5947')">NTM 7 — 5947</div>
      <div class="p-btn" onclick="sp('5545')">5545</div>
      <div class="p-btn" onclick="sp('25832')">UTM 32N</div>
      <div class="p-btn" onclick="sp('25833')">UTM 33N</div>
    </div>
    <button class="go-btn" onclick="startWidget()">OPEN MAP</button>
  </div>
</div>

<!-- Loading screen -->
<div id="loading-screen">
  <div class="loading-inner">
    <span class="dot-anim"></span>
    <div id="log-list"></div>
  </div>
</div>

<script>
function sp(code) {
  document.getElementById('epsg-input').value = code;
}

function _log(msg, cls) {
  var el = document.getElementById('log-list');
  if (!el) return;
  var d = document.createElement('div');
  d.textContent = '› ' + msg;
  if (cls) d.className = cls;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function changeCRS() {
  var raw = document.getElementById('crs-input').value.trim();
  if (raw) {
    S.epsg = 'EPSG:' + raw.replace(/epsg:/i,'').trim();
    document.getElementById('crs-input').value = raw.replace(/epsg:/i,'').trim();
  }
}

function startWidget() {
  var raw = document.getElementById('epsg-input').value.trim() || '5946';
  S.epsg = 'EPSG:' + raw.replace(/epsg:/i,'').trim();
  document.getElementById('setup-overlay').style.display = 'none';
  document.getElementById('loading-screen').style.display = 'flex';
  document.getElementById('crs-input').value = raw.replace(/epsg:/i,'').trim();
  loadScripts();
}

function loadScripts() {
  _log('Loading Cesium…');
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/cesium@1.136.0/Build/Cesium/Cesium.js';
  s.onload = function() { _log('Cesium ready', 'ok'); initCesium(); };
  s.onerror = function() { _log('Cesium failed to load', 'err'); };
  document.head.appendChild(s);
}

async function initCesium() {
  _log('Initialising globe…');
  Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlOGNmZDViOS0wZWYwLTQ1ZjktODkwZS0wNGJiODM4YTdjM2EiLCJpZCI6NDAyNDEwLCJpYXQiOjE3NzMzMDk4OTd9.yqBK0ZLNU-S9J2K-0xxMWc34Kzdlb0oCxgNOY4ADGDs';

  var viewer = new Cesium.Viewer('cesiumViewport', {
    terrainProvider: Cesium.CesiumTerrainProvider.fromIonAssetId ? await Cesium.CesiumTerrainProvider.fromIonAssetId(1) : Cesium.createWorldTerrain(),
    baseLayerPicker: false,
    navigationHelpButton: false,
    sceneModePicker: false,
    geocoder: false,
    homeButton: false,
    fullscreenButton: false,
    animation: false,
    timeline: false,
    infoBox: false,
    selectionIndicator: false,
    creditContainer: document.createElement('div')
  });

  S.viewer = viewer;

  // Red box marker for camera position
  S.marker = viewer.entities.add({
    position: Cesium.Cartesian3.fromDegrees(0, 0, 0),
    show: false,
    box: {
      dimensions: new Cesium.Cartesian3(20, 20, 20),
      material: Cesium.Color.RED.withAlpha(0.85)
    }
  });

  _log('Globe ready', 'ok');
  document.getElementById('loading-screen').style.display = 'none';
  // Init measure click handler
  setTimeout(function() { if (!_measureInited) { _measureInited=true; initMeasureHandler(); } }, 500);

  // Define camera handlers
  // _startPolling defined globally above

  window.setNavMode = function(mode) {
    if (!S.api) return;
    S.api.setNavigationMode(mode);
    document.querySelectorAll('button').forEach(function(b) {
      b.style.color = '#666'; b.style.borderColor = '#333';
    });
    var label = mode === 0 ? 'WALK' : 'ORBIT';
    document.querySelectorAll('button').forEach(function(b) {
      if (b.textContent === label) { b.style.color = '#00d4ff'; b.style.borderColor = '#00d4ff'; }
    });
  };

  window._onCamera = function(cam) {
    var w = toWgs84(cam.position.easting, cam.position.northing);
    if (!w) return;
    var alt = cam.position.alt;
    var quat = cam.orientation || cam.quaternion;
    if (Array.isArray(quat)) quat = { x: quat[0], y: quat[1], z: quat[2], w: quat[3] };

    // Compute heading from movement direction when position changes
    var computedHeading = null;
    if (S.lastPos) {
      var dE = cam.position.easting - S.lastPos[2];
      var dN = cam.position.northing - S.lastPos[3];
      var dist = Math.sqrt(dE*dE + dN*dN);
      if (dist > 0.5) {
        // When orbiting, camera points TOWARD orbit center = opposite of travel direction
        // So heading = travel direction + 180 degrees
        computedHeading = Math.atan2(dE, dN) + Math.PI;
      }
    }
    flyTo(w.lon, w.lat, alt, quat, computedHeading);
    S.lastPos = [w.lon, w.lat, cam.position.easting, cam.position.northing];

    document.getElementById('v-lat').textContent = 'E  ' + cam.position.easting.toFixed(1);
    document.getElementById('v-lon').textContent = 'N  ' + cam.position.northing.toFixed(1);
    document.getElementById('v-alt').textContent = 'H  ' + (-cam.position.alt).toFixed(1) + ' m';
  };

  window._onPick = function(res) {
    var w = toWgs84(res.point[0], res.point[2]);
    if (w) flyTo(w.lon, w.lat, res.point[1], null);
  };

  // Flush pending events
  S.ready = true;
  S.pending.forEach(function(e) {
    if (e.type === 'cam') window._onCamera(e.d);
    else if (e.type === 'pick') window._onPick(e.d);
  });
  S.pending = [];
}

// Throttle: max 60fps
var _lastUpdate = 0;

function flyTo(lon, lat, alt, quat, computedHeading) {
  if (!S.viewer) return;
  if (isNaN(lon) || isNaN(lat)) return;

  // Throttle to ~60fps
  var now = Date.now();
  if (now - _lastUpdate < 16) return;
  _lastUpdate = now;

  var viewAlt = Math.max(50 - alt, 5);
  var dest = Cesium.Cartesian3.fromDegrees(lon, lat, viewAlt);



  // Convert BCF quaternion to Cesium HPR
  // BCF: X=East, Y=North, Z=Up (right-handed)
  // Symptoms: CCW rotation -> globe tilts down = heading and pitch are swapped
  //           camera tilt up -> globe rotates CCW = pitch and heading swapped
  // Fix: swap heading/pitch axes
  var heading = 0, pitch = Cesium.Math.toRadians(-20), roll = 0;
  if (quat) {
    var qx=quat.x, qy=quat.y, qz=quat.z, qw=quat.w;
    // BCF quaternion: X=East, Y=North, Z=Up
    // Log raw quat on first call so we can see default orientation
    if (!window._quatLogged) {
      window._quatLogged = true;
      console.log('BCF quat:', JSON.stringify({x:qx,y:qy,z:qz,w:qw}));
      var el = document.getElementById('v-alt');
      if (el) el.textContent = 'Q: ' + qx.toFixed(3)+','+qy.toFixed(3)+','+qz.toFixed(3)+','+qw.toFixed(3);
    }
    // Same method as byggstyrning: Euler YXZ from quaternion
    var len = Math.sqrt(qx*qx + qy*qy + qz*qz + qw*qw);
    qx/=len; qy/=len; qz/=len; qw/=len;

    // Three.js setFromQuaternion(q, 'YXZ') equivalent
    var m13 = 2*(qx*qz + qw*qy);
    var m23 = 2*(qy*qz - qw*qx);
    var m33 = 1 - 2*(qx*qx + qy*qy);
    var m11 = 1 - 2*(qy*qy + qz*qz);
    var m21 = 2*(qx*qy + qw*qz);
    var m22 = 1 - 2*(qx*qx + qz*qz);

    var ex = Math.asin(-Math.max(-1, Math.min(1, m23)));
    var ey, ez;
    if (Math.abs(m23) < 0.9999999) {
      ey = Math.atan2(m13, m33);
      ez = Math.atan2(m21, m22);
    } else {
      ey = Math.atan2(-m13, m11);
      ez = 0;
    }

    heading = ey + Math.PI;
    pitch = -ex;
    roll = 0;
  }

  // Use setView for instant, no animation — real-time tracking
  S.viewer.camera.setView({
    destination: dest,
    orientation: { heading: heading, pitch: pitch, roll: roll }
  });

  S.lastPos = [lon, lat];

  // Update compass
  var needle = document.getElementById('compass-needle');
  var hdgEl = document.getElementById('compass-hdg');
  if (needle) {
    var deg = Cesium.Math.toDegrees(heading) % 360;
    if (deg < 0) deg += 360;
    needle.setAttribute('transform', 'rotate(' + deg + ',30,30)');
    if (hdgEl) hdgEl.textContent = String(Math.round(deg)).padStart(3,'0') + '°';
  }

  // Update sight line if active
  if (window._sightActive) updateSightLine(lon, lat, viewAlt, heading, pitch);
}

// ── MEASURE TOOL ──────────────────────────────────────────────────────────
var _measureActive = false;
var _measurePoints = [];
var _measureEntities = [];

function toggleMeasure() {
  _measureActive = !_measureActive;
  var btn = document.getElementById('measure-btn');
  btn.classList.toggle('active', _measureActive);
  if (!_measureActive) {
    clearMeasure();
    document.getElementById('measure-result').textContent = '';
  } else {
    document.getElementById('measure-result').textContent = 'Klikk punkt 1…';
  }
}

function clearMeasure() {
  _measurePoints = [];
  _measureEntities.forEach(function(e) { S.viewer.entities.remove(e); });
  _measureEntities = [];
}

function haversineM(lat1, lon1, lat2, lon2) {
  var R = 6371000;
  var dLat = (lat2-lat1)*Math.PI/180;
  var dLon = (lon2-lon1)*Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
          Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
          Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Hook into Cesium click for measure
function initMeasureHandler() {
  var handler = new Cesium.ScreenSpaceEventHandler(S.viewer.scene.canvas);
  handler.setInputAction(function(click) {
    if (!_measureActive) return;
    var ray = S.viewer.camera.getPickRay(click.position);
    var pos = S.viewer.scene.globe.pick(ray, S.viewer.scene);
    if (!pos) return;
    var carto = Cesium.Cartographic.fromCartesian(pos);
    var lat = Cesium.Math.toDegrees(carto.latitude);
    var lon = Cesium.Math.toDegrees(carto.longitude);
    var alt = carto.height;

    _measurePoints.push({lat:lat, lon:lon, alt:alt});

    // Add dot
    _measureEntities.push(S.viewer.entities.add({
      position: pos,
      point: { pixelSize: 8, color: Cesium.Color.fromCssColorString('#00d4ff'), outlineColor: Cesium.Color.WHITE, outlineWidth: 1 }
    }));

    if (_measurePoints.length === 1) {
      document.getElementById('measure-result').textContent = 'Klikk punkt 2…';
    } else if (_measurePoints.length === 2) {
      var p1 = _measurePoints[0], p2 = _measurePoints[1];
      var hDist = haversineM(p1.lat, p1.lon, p2.lat, p2.lon);
      var vDiff = p2.alt - p1.alt;
      var slope3d = Math.sqrt(hDist*hDist + vDiff*vDiff);
      var grade = hDist > 0 ? (vDiff/hDist*100).toFixed(1) : '0.0';

      // Draw line
      _measureEntities.push(S.viewer.entities.add({
        polyline: {
          positions: [Cesium.Cartesian3.fromDegrees(p1.lon,p1.lat,p1.alt),
                      Cesium.Cartesian3.fromDegrees(p2.lon,p2.lat,p2.alt)],
          width: 2,
          material: new Cesium.ColorMaterialProperty(Cesium.Color.fromCssColorString('#00d4ff').withAlpha(0.85)),
          clampToGround: false
        }
      }));

      // Label midpoint
      var midLat = (p1.lat+p2.lat)/2, midLon = (p1.lon+p2.lon)/2, midAlt = (p1.alt+p2.alt)/2+20;
      var distTxt = hDist >= 1000 ? (hDist/1000).toFixed(2)+' km' : Math.round(hDist)+' m';
      _measureEntities.push(S.viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(midLon, midLat, midAlt),
        label: {
          text: distTxt,
          font: '13px DM Mono, monospace',
          fillColor: Cesium.Color.fromCssColorString('#00d4ff'),
          outlineColor: Cesium.Color.BLACK, outlineWidth: 3,
          style: Cesium.LabelStyle.FILL_AND_OUTLINE,
          verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
          pixelOffset: new Cesium.Cartesian2(0, -8)
        }
      }));

      var res = distTxt + ' horiz';
      if (Math.abs(vDiff) > 0.5) res += '  |  ' + (vDiff>0?'+':'') + vDiff.toFixed(1)+'m  |  stigning '+grade+'%';
      document.getElementById('measure-result').textContent = res;

      // Draw height profile between the two points
      drawProfile(p1, p2);

      _measurePoints = [];
    }
  }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
}

// ── HEIGHT PROFILE ─────────────────────────────────────────────────────────
function drawProfile(p1, p2) {
  var panel = document.getElementById('profile-panel');
  var canvas = document.getElementById('profile-canvas');
  panel.style.display = 'block';
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  var steps = 40;
  var positions = [];
  for (var i = 0; i <= steps; i++) {
    var t = i/steps;
    positions.push(Cesium.Cartographic.fromDegrees(
      p1.lon + (p2.lon-p1.lon)*t,
      p1.lat + (p2.lat-p1.lat)*t
    ));
  }

  Cesium.sampleTerrainMostDetailed(S.viewer.terrainProvider, positions).then(function(sampled) {
    var alts = sampled.map(function(p){ return p.height || 0; });
    var minA = Math.min.apply(null, alts);
    var maxA = Math.max.apply(null, alts);
    var range = Math.max(maxA - minA, 1);

    ctx.clearRect(0,0,W,H);

    // Grid lines
    ctx.strokeStyle = 'rgba(0,212,255,0.1)';
    ctx.lineWidth = 1;
    for (var g = 0; g <= 4; g++) {
      var gy = H - (g/4)*(H-20) - 10;
      ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke();
      ctx.fillStyle = 'rgba(0,212,255,0.5)';
      ctx.font = '9px DM Mono, monospace';
      ctx.fillText(Math.round(minA + (g/4)*range)+'m', 2, gy-2);
    }

    // Fill
    ctx.beginPath();
    ctx.moveTo(0, H);
    alts.forEach(function(a, i) {
      var x = (i/steps)*W;
      var y = H - 10 - ((a-minA)/range)*(H-20);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
    var grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'rgba(0,212,255,0.5)');
    grad.addColorStop(1,'rgba(0,212,255,0.05)');
    ctx.fillStyle = grad;
    ctx.fill();

    // Line
    ctx.beginPath();
    ctx.strokeStyle = '#00d4ff';
    ctx.lineWidth = 1.5;
    alts.forEach(function(a, i) {
      var x = (i/steps)*W;
      var y = H - 10 - ((a-minA)/range)*(H-20);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke();

    // Start/end labels
    var hDist = haversineM(p1.lat, p1.lon, p2.lat, p2.lon);
    var distTxt = hDist >= 1000 ? (hDist/1000).toFixed(1)+'km' : Math.round(hDist)+'m';
    ctx.fillStyle = 'rgba(0,212,255,0.7)';
    ctx.font = '9px DM Mono, monospace';
    ctx.fillText('0', 2, H-2);
    ctx.fillText(distTxt, W-30, H-2);
  });
}

// ── SIGHT LINE ─────────────────────────────────────────────────────────────
var _sightActive = false;
var _sightEntity = null;

function toggleSightLine() {
  _sightActive = !_sightActive;
  var btn = document.getElementById('sight-btn');
  btn.classList.toggle('active', _sightActive);
  if (!_sightActive && _sightEntity) {
    S.viewer.entities.remove(_sightEntity);
    _sightEntity = null;
  }
}

function updateSightLine(lon, lat, alt, heading, pitch) {
  if (!S.viewer) return;
  var dist = 2000; // 2km sightline
  var dLat = Math.cos(heading) * Math.cos(pitch) * dist / 111320;
  var dLon = Math.sin(heading) * Math.cos(pitch) * dist / (111320 * Math.cos(lat*Math.PI/180));
  var dAlt = Math.sin(pitch) * dist;

  var endLat = lat + dLat;
  var endLon = lon + dLon;
  var endAlt = Math.max(alt + dAlt, 0);

  var start = Cesium.Cartesian3.fromDegrees(lon, lat, alt);
  var end = Cesium.Cartesian3.fromDegrees(endLon, endLat, endAlt);

  if (_sightEntity) S.viewer.entities.remove(_sightEntity);
  _sightEntity = S.viewer.entities.add({
    polyline: {
      positions: [start, end],
      width: 1.5,
      material: new Cesium.PolylineDashMaterialProperty({
        color: Cesium.Color.fromCssColorString('#ffcc00').withAlpha(0.7),
        dashLength: 16
      })
    }
  });
}

// Init measure handler when globe is ready
var _measureInited = false;
var _origInitCesium = window.initCesium;
</script>
